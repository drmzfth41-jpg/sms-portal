<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — SMS Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-body: #f0f4f8; --bg-card: #ffffff; --bg-input: #f8fafc;
      --border: #e2e8f0; --border-input: #cbd5e1;
      --text-primary: #1e293b; --text-muted: #64748b; --text-dim: #94a3b8;
      --accent-1: #2563eb; --danger: #dc2626;
    }
    body {
      background: linear-gradient(135deg, #e0e9f7 0%, #f0f4f8 60%, #e8f0fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'Segoe UI', sans-serif;
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 1rem; }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2rem;
      box-shadow: 0 8px 30px rgba(37,99,235,.1), 0 2px 8px rgba(0,0,0,.06);
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: white;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 16px rgba(37,99,235,.35);
    }
    h1 { color: var(--text-primary); font-size: 1.5rem; font-weight: 700; text-align: center; margin: 0 0 .25rem; }
    .sub { color: var(--text-dim); font-size: .875rem; text-align: center; margin-bottom: 2rem; }
    label { color: var(--text-muted); font-size: .825rem; font-weight: 500; }
    .form-control {
      background: var(--bg-input); border: 1px solid var(--border-input);
      color: var(--text-primary); border-radius: 8px;
      padding: .6rem .9rem; font-size: .875rem;
    }
    .form-control:focus {
      background: var(--bg-card); border-color: var(--accent-1);
      color: var(--text-primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      outline: none;
    }
    .form-control::placeholder { color: var(--text-dim); }
    .btn-toggle {
      background: var(--bg-input); border: 1px solid var(--border-input);
      border-left: none; color: var(--text-dim);
      padding: .6rem .9rem; border-radius: 0 8px 8px 0;
      cursor: pointer; transition: color .2s;
    }
    .btn-toggle:hover { color: var(--text-primary); background: var(--bg-card); }
    .input-group .form-control { border-radius: 8px 0 0 8px; }
    .btn-login {
      background: var(--accent-1);
      border: none; border-radius: 8px; padding: .7rem;
      font-weight: 600; color: white; width: 100%;
      font-size: 1rem; transition: background .2s, box-shadow .2s, transform .1s;
    }
    .btn-login:hover { background: #1d4ed8; color: white; box-shadow: 0 4px 14px rgba(37,99,235,.35); }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
    .error-box {
      display: none;
      background: #fef2f2; border: 1px solid #fecaca;
      color: #b91c1c; border-radius: 8px;
      padding: .65rem .9rem; font-size: .85rem;
      align-items: center; gap: .5rem;
      margin-bottom: 1rem;
    }
    .error-box.show { display: flex; }
    .spinner-border-sm { width: 1rem; height: 1rem; border-width: .15em; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo"><i class="bi bi-chat-dots-fill"></i></div>
      <h1>SMS Portal</h1>
      <p class="sub">Hesabınıza giriş yapın</p>

      <div class="error-box" id="errorBox">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="errorMsg">Kullanıcı adı veya şifre hatalı.</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">Kullanıcı Adı</label>
          <input type="text" id="username" class="form-control" placeholder="Kullanıcı adınız" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Şifre</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="Şifreniz" required>
            <button type="button" class="btn-toggle" id="togglePass">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap</span>
          <span id="btnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2"></span>Giriş yapılıyor...
          </span>
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Zaten giriş yapmışsa dashboard'a yönlendir
    if (localStorage.getItem('sms_portal_token')) {
      window.location.href = '/dashboard.html';
    }

    document.getElementById('togglePass').addEventListener('click', function () {
      const inp = document.getElementById('password');
      const ico = document.getElementById('eyeIcon');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      ico.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errBox   = document.getElementById('errorBox');

      errBox.classList.remove('show');
      btn.disabled = true;
      document.getElementById('btnText').classList.add('d-none');
      document.getElementById('btnSpinner').classList.remove('d-none');

      try {
        const res = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.token) {
          localStorage.setItem('sms_portal_token', data.token);
          window.location.href = '/dashboard.html';
        } else {
          document.getElementById('errorMsg').textContent = data.error || 'Giriş başarısız.';
          errBox.classList.add('show');
          btn.disabled = false;
          document.getElementById('btnText').classList.remove('d-none');
          document.getElementById('btnSpinner').classList.add('d-none');
        }
      } catch {
        document.getElementById('errorMsg').textContent = 'Sunucuya bağlanılamadı.';
        errBox.classList.add('show');
        btn.disabled = false;
        document.getElementById('btnText').classList.remove('d-none');
        document.getElementById('btnSpinner').classList.add('d-none');
      }
    });
  </script>
</body>
</html>
